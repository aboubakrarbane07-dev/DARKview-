name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Build APK
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug
        else
          echo "No gradle wrapper found, using standard android build tools."
          # في حال استخدام نظام Ant القديم
        fi
