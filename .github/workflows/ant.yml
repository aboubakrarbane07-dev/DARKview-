name: Build Android APK with Ant

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Android SDK and Ant
      run: |
        sudo apt-get update
        sudo apt-get install -y ant openjdk-8-jdk
        # تحميل أدوات بناء أندرويد المتوافقة مع Ant يدوياً لتوليد الـ APK
        wget https://dl.google.com/android/repository/commandlinetools-linux-6858069_latest.zip
        unzip commandlinetools-linux-*.zip -d cmdline-tools
        mkdir --parents android-sdk/cmdline-tools
        mv cmdline-tools/cmdline-tools android-sdk/cmdline-tools/latest
        export ANDROID_HOME=$PWD/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-21" "build-tools;21.1.2"

    - name: Build Debug APK
      run: |
        export ANDROID_HOME=$PWD/android-sdk
        # تحديث المشروع وتوليد ملف build.xml إذا لم يكن موجوداً
        android update project --path . --target android-21
        ant debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DarkoCut-Debug-APK
        path: bin/*-debug.apk
