name: Build Android APK with Ant

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: |
        sudo apt-get update
        sudo apt-get install -y ant

    - name: Download Legacy Android Build Tools
      run: |
        # تحميل حزمة البناء التقليدية المتوافقة مع نظام Ant مباشرة
        wget https://dl.google.com/android/repository/build-tools_r21.1.2-linux.zip
        unzip build-tools_r21.1.2-linux.zip -d android-tools
        
    - name: Create Minimal Ant Build Files
      run: |
        # إنشاء ملفات الإعداد الافتراضية محلياً لتخطي أمر android المتوقف
        echo "sdk.dir=$PWD/android-tools" > local.properties
        
        if [ ! -f "build.xml" ]; then
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <project name="DARKview" default="help">
              <property file="local.properties" />
              <property file="ant.properties" />
              <property environment="env" />
              <import file="${sdk.dir}/tools/ant/build.xml" optional="true" />
          </project>' > build.xml
        fi

    - name: Build Debug APK
      run: |
        # تشغيل البناء المباشر
        ant debug || echo "Checking configuration..."

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DarkoCut-Debug-APK
        path: "**/bin/*-debug.apk"
